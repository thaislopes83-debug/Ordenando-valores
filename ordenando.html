<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ordenando Valores</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="ordenando.js"></script>
</head>
<body class="p-4">
    <div class="container" style="max-width: 500px;">
        <h1>Ordenando Valores</h1>
        
        <div class="form-group">
            <label for="valor">Valor</label>
            <input type="number" id="valor" class="form-control" value="1">
            <button class="btn btn-primary mt-2" onclick="add()">Adicionar</button>
        </div>

        <hr>

        <div class="form-group">
            <select id="algoritmo" class="form-control">
                <option value="bubble" selected>Bubble Sort</option>
                <option value="selection">Selection Sort</option>
                <option value="quick">Quick Sort</option>
            </select>
            <div class="mt-2">
                <button class="btn btn-primary" onclick="ordenar()">Ordenar</button>
                <button class="btn btn-primary" onclick="misturar()">Misturar</button>
            </div>
        </div>

        <hr>

        <ul id="valores"></ul>
    </div>

    <script>
        function add() {
            const campoValor = document.getElementById('valor');
            const lista = document.getElementById('valores');
            const node = document.createElement("li");
            const textNode = document.createTextNode(campoValor.value);
            node.appendChild(textNode);
            lista.appendChild(node);
        }

        function ordenar() {
            const lista = document.getElementById('valores');
            const selecao = document.getElementById('algoritmo');
            let vetor = Array.from(lista.children).map(li => parseInt(li.innerHTML));
            
            const algoritmos = {
                0: () => bubble_sort(vetor),
                1: () => selection_sort(vetor),
                2: () => quick_sort(vetor, 0, vetor.length - 1)
            };

            algoritmos[selecao.selectedIndex]();

            lista.innerHTML = vetor.map(v => `<li>${v}</li>`).reduce((acc, cur) => acc + cur, "");
        }

        function misturar() {
            const lista = document.getElementById('valores');
            let vetor = Array.from(lista.children).map(li => parseInt(li.innerHTML));
            shuffle(vetor, vetor.length);
            lista.innerHTML = vetor.map(v => `<li>${v}</li>`).reduce((acc, cur) => acc + cur, "");
        }
    </script>
</body>
</html>
